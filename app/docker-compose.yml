services:
  app:
    image: ${IMAGE_URI:-131730003210.dkr.ecr.us-east-1.amazonaws.com/docker-demo:latest}
    container_name: counter-app
    restart: unless-stopped
    ports:
      - "80:3000"
    environment:
      PORT: "3000"
      APP_VERSION: "${APP_VERSION:-latest}"
      # 優先使用 REDIS_URL。
      # REDIS_HOST/REDIS_PORT 保留給 EC2 user data 分開寫入時使用。
      REDIS_URL: "${REDIS_URL:-}"
      REDIS_HOST: "${REDIS_HOST:-}"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      REDIS_CONNECT_TIMEOUT_MS: "${REDIS_CONNECT_TIMEOUT_MS:-3000}"
      REDIS_CONNECT_MAX_RETRIES: "${REDIS_CONNECT_MAX_RETRIES:-5}"
      # /reset 需要這個 token。正式值請放 EC2 env/SSM/Secrets Manager，不要放 GitHub。
      RESET_TOKEN: "${RESET_TOKEN:-}"
      # Jira 小卡建立功能。正式值請放 EC2 env/SSM/Secrets Manager，不要放前端。
      JIRA_BASE_URL: "${JIRA_BASE_URL:-}"
      JIRA_REST_BASE_URL: "${JIRA_REST_BASE_URL:-}"
      JIRA_EMAIL: "${JIRA_EMAIL:-}"
      JIRA_API_TOKEN: "${JIRA_API_TOKEN:-}"
      JIRA_PROJECT_KEY: "${JIRA_PROJECT_KEY:-}"
      JIRA_ISSUE_TYPE: "${JIRA_ISSUE_TYPE:-交接事項}"
      JIRA_ISSUE_TYPE_ID: "${JIRA_ISSUE_TYPE_ID:-}"
      JIRA_LABELS: "${JIRA_LABELS:-電話連絡,noc-oncall}"
      JIRA_DEFAULT_PRIORITY: "${JIRA_DEFAULT_PRIORITY:-}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
