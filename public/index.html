<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Counter App v6</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(90deg, #1d4ed8 0%, #0f172a 45%, #0ea5e9 100%);
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 900px;
      background: rgba(30, 41, 59, 0.92);
      border-radius: 24px;
      padding: 32px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 2.5rem;
      margin: 0 0 8px;
    }

    .sub {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .badge {
      display: inline-block;
      margin-bottom: 20px;
      padding: 10px 16px;
      border-radius: 999px;
      font-weight: bold;
    }

    .badge.ok {
      color: #bbf7d0;
      background: rgba(16, 185, 129, 0.12);
      border: 1px solid rgba(16, 185, 129, 0.35);
    }

    .badge.error {
      color: #fecaca;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.35);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-box {
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 20px;
      text-align: center;
    }

    .label {
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .stat-number {
      font-size: 2.5rem;
      font-weight: 800;
    }

    .stat-date {
      font-size: 1.6rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .count {
      text-align: center;
      font-size: 4rem;
      font-weight: 800;
      margin: 20px 0;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 16px;
      color: white;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .inc {
      background: #3b82f6;
    }

    .reset {
      background: #ef4444;
    }

    .error-box {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border-radius: 10px;
      color: #fecaca;
      background: rgba(239, 68, 68, 0.12);
    }

    .footer {
      margin-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 10px;
      font-size: 0.9rem;
    }

    a {
      color: #93c5fd;
    }
  </style>
</head>

<body>
  <div class="card">

    <h1>Counter App v6</h1>
    <div class="sub">Unique Visitor Tracking + AWS + CI/CD</div>

    <div id="redisBadge" class="badge">Redis: checking...</div>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="label">Total Visitors</div>
        <div class="stat-number" id="totalViews">-</div>
      </div>

      <div class="stat-box">
        <div class="label">Today Visitors</div>
        <div class="stat-number" id="todayViews">-</div>
      </div>

      <div class="stat-box">
        <div class="label">Today</div>
        <div class="stat-date" id="today">-</div>
      </div>
    </div>

    <div class="label">Current Count</div>
    <div class="count" id="count">-</div>

    <button class="inc" onclick="increment()">+1</button>
    <button class="reset" onclick="resetCounter()">Reset</button>

    <div id="errorBox" class="error-box"></div>

    <div class="footer">
      <div><a href="/stats" target="_blank">/stats</a></div>
      <div><a href="/whoami" target="_blank">/whoami</a></div>
    </div>

  </div>

  <script>
    function setError(msg) {
      const box = document.getElementById("errorBox");
      box.style.display = "block";
      box.textContent = msg;
    }

    function updateBadge(status) {
      const badge = document.getElementById("redisBadge");
      badge.textContent = "Redis: " + status;
      badge.className = status === "ready" ? "badge ok" : "badge error";
    }

    function getVisitorId() {
      let id = localStorage.getItem("visitor_id");
      if (!id) {
        id = crypto.randomUUID();
        localStorage.setItem("visitor_id", id);
      }
      return id;
    }

    async function trackView() {
      const res = await fetch("/track-view", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ visitorId: getVisitorId() })
      });

      const data = await res.json();

      document.getElementById("totalViews").textContent = data.totalVisitors;
      document.getElementById("todayViews").textContent = data.todayVisitors;
      document.getElementById("today").textContent = data.today;

      updateBadge(data.redis);
    }

    async function loadCount() {
      const res = await fetch("/count");
      const data = await res.json();
      document.getElementById("count").textContent = data.count;
    }

    async function increment() {
      await fetch("/increment", { method: "POST" });
      loadCount();
    }

    async function resetCounter() {
      await fetch("/reset", { method: "POST" });
      loadCount();
    }

    trackView();
    loadCount();
  </script>

</body>
</html>
