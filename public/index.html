<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSP 值班中控台</title>
  <script>
    try {
      document.documentElement.dataset.theme = localStorage.getItem("msp_theme") || "light";
    } catch {
      document.documentElement.dataset.theme = "light";
    }
  </script>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="card">
    <div class="header-row">
      <div>
        <h1>MSP 值班中控台</h1>
        <div class="sub">Vue 前端尚未建置</div>
      </div>
      <span class="badge error">frontend/dist missing</span>
    </div>

    <section class="incident-panel">
      <h2 class="incident-title">請先產生前端 bundle</h2>
      <p class="incident-subtitle">
        這是 Express 的靜態 fallback 頁。正式中控台由 Vue + Vite build 後的
        <code>frontend/dist/index.html</code> 提供。
      </p>

      <div class="summary-box">
        <pre class="summary-output">npm run build
npm start</pre>
      </div>

      <div class="incident-actions">
        <span class="incident-actions-label">檢查</span>
        <a class="incident-record-action primary" href="/ready">Ready</a>
        <a class="incident-record-action" href="/health">Health</a>
      </div>
    </section>
  </main>
</body>
</html>
