name: Build, Push, and Refresh ASG

on:
  push:
    branches:
      - main

concurrency:
  group: counter-app-deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "131730003210"
  ECR_REPOSITORY: docker-demo
  ASG_NAME: counter-app-asg
  AWS_DEPLOY_ROLE_ARN: arn:aws:iam::131730003210:role/counter-app-github-actions-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: counter-app-github-actions

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image uri
        run: |
          echo "IMAGE_URI=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: Build Docker image (latest + sha)
        run: |
          docker build \
            -t $IMAGE_URI:latest \
            -t $IMAGE_URI:$IMAGE_TAG \
            .

      - name: Push Docker images to ECR
        run: |
          docker push $IMAGE_URI:latest
          docker push $IMAGE_URI:$IMAGE_TAG

      - name: Start ASG instance refresh
        id: refresh
        run: |
          set +e
          START_OUTPUT=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name $ASG_NAME \
            --preferences '{"MinHealthyPercentage":100,"InstanceWarmup":120}' \
            --query 'InstanceRefreshId' \
            --output text 2>&1)
          START_EXIT=$?
          set -e

          if [ "$START_EXIT" -eq 0 ]; then
            REFRESH_ID="$START_OUTPUT"
            echo "Started ASG instance refresh: $REFRESH_ID"
          elif echo "$START_OUTPUT" | grep -q "InstanceRefreshInProgress"; then
            echo "An ASG instance refresh is already running. Waiting for the existing refresh instead."

            REFRESH_ID=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --query "InstanceRefreshes[?Status=='Pending' || Status=='InProgress' || Status=='Cancelling' || Status=='RollbackInProgress'] | [0].InstanceRefreshId" \
              --output text)

            if [ -z "$REFRESH_ID" ] || [ "$REFRESH_ID" = "None" ]; then
              echo "Could not find the existing instance refresh id."
              echo "$START_OUTPUT"
              exit 1
            fi

            echo "Using existing ASG instance refresh: $REFRESH_ID"
          else
            echo "$START_OUTPUT"
            exit "$START_EXIT"
          fi

          echo "refresh_id=$REFRESH_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for ASG instance refresh
        run: |
          REFRESH_ID="${{ steps.refresh.outputs.refresh_id }}"

          # 沒有這段等待，GitHub Actions 可能顯示成功，
          # 但 ASG 後面其實換機失敗。
          for attempt in {1..60}; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --instance-refresh-ids "$REFRESH_ID" \
              --query 'InstanceRefreshes[0].Status' \
              --output text)

            echo "Attempt $attempt: refresh status is $STATUS"

            case "$STATUS" in
              Successful)
                exit 0
                ;;
              Failed|Cancelled|RollbackFailed|RollbackSuccessful)
                exit 1
                ;;
            esac

            sleep 30
          done

          echo "Instance refresh did not finish in time"
          exit 1

      - name: Show deployed image tags
        run: |
          echo "Pushed: $IMAGE_URI:latest"
          echo "Pushed: $IMAGE_URI:$IMAGE_TAG"
