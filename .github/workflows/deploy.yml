name: Build, Push, and Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: counter-app-deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ACCOUNT_ID: "131730003210"
  ECR_REPOSITORY: docker-demo
  ASG_NAME: counter-app-asg
  AWS_DEPLOY_ROLE_ARN: arn:aws:iam::131730003210:role/counter-app-github-actions-deploy
  ALLOW_ASG_REFRESH_FALLBACK: "false"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Run pre-deploy smoke checks
        run: |
          node --check server.js
          node --check public/handover-summary.js
          node --check mcp/server.mjs
          node --check mcp/smoke-test.mjs
          npm run mcp:smoke

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          role-session-name: counter-app-github-actions

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image uri
        run: |
          echo "IMAGE_URI=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}" >> $GITHUB_ENV
          echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV

      - name: Build Docker image (latest + sha)
        run: |
          docker build \
            -t $IMAGE_URI:latest \
            -t $IMAGE_URI:$IMAGE_TAG \
            .

      - name: Push Docker images to ECR
        run: |
          docker push $IMAGE_URI:latest
          docker push $IMAGE_URI:$IMAGE_TAG

      - name: Find current ASG instances
        id: targets
        continue-on-error: true
        run: |
          aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$ASG_NAME" \
            --query "AutoScalingGroups[0].Instances[*].[InstanceId,LifecycleState,HealthStatus,AvailabilityZone]" \
            --output table

          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$ASG_NAME" \
            --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId" \
            --output text)

          echo "In-service ASG instances selected for SSM deploy: ${INSTANCE_IDS:-none}"

          for INSTANCE_ID in $INSTANCE_IDS; do
            set +e
            PING_STATUS_OUTPUT=$(aws ssm describe-instance-information \
              --filters "Key=InstanceIds,Values=${INSTANCE_ID}" \
              --query "InstanceInformationList[0].PingStatus" \
              --output text 2>&1)
            PING_STATUS_EXIT=$?
            set -e

            if [ "$PING_STATUS_EXIT" -ne 0 ]; then
              echo "::warning::Could not query Systems Manager for ${INSTANCE_ID}: ${PING_STATUS_OUTPUT}"
              continue
            fi

            PING_STATUS="$PING_STATUS_OUTPUT"

            if [ "$PING_STATUS" = "Online" ]; then
              echo "${INSTANCE_ID} is Online in Systems Manager"
            else
              echo "::warning::${INSTANCE_ID} is not Online in Systems Manager; PingStatus=${PING_STATUS}"
            fi
          done

          echo "Deploy targets: ${INSTANCE_IDS:-none}"
          echo "instance_ids=${INSTANCE_IDS}" >> "$GITHUB_OUTPUT"

      - name: Deploy to existing EC2 with SSM
        id: ssm_deploy
        continue-on-error: ${{ env.ALLOW_ASG_REFRESH_FALLBACK == 'true' }}
        if: steps.targets.outputs.instance_ids != ''
        run: |
          set -euo pipefail

          INSTANCE_IDS="${{ steps.targets.outputs.instance_ids }}"
          IMAGE_URI_WITH_TAG="${IMAGE_URI}:${IMAGE_TAG}"
          DEPLOY_COMMENT="Deploy counter-app ${IMAGE_TAG:0:12}"

          cat > deploy-on-instance.sh <<'SCRIPT'
          #!/bin/sh
          set -eu

          AWS_REGION="__AWS_REGION__"
          AWS_ACCOUNT_ID="__AWS_ACCOUNT_ID__"
          ECR_REPO="__ECR_REPOSITORY__"
          IMAGE_TAG="__IMAGE_TAG__"
          APP_VERSION="$(printf "%s" "$IMAGE_TAG" | cut -c1-18)"
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}:${IMAGE_TAG}"

          REDIS_ENDPOINT="demo-caches.nyynzy.ng.0001.use1.cache.amazonaws.com"
          REDIS_PORT="6379"
          REDIS_URL="redis://${REDIS_ENDPOINT}:${REDIS_PORT}"

          CONTAINER_NAME="counter-app"
          CANDIDATE_CONTAINER_NAME="${CONTAINER_NAME}-candidate"
          APP_PORT="3000"
          HOST_PORT="80"
          CANDIDATE_HOST_PORT="18080"
          TRUST_PROXY_HOPS="1"

          JIRA_BASE_URL="https://metaage-corp-p400.atlassian.net"
          JIRA_REST_BASE_URL=""
          JIRA_PROJECT_KEY="PMP"
          JIRA_ISSUE_TYPE="交接事項"
          JIRA_ISSUE_TYPE_ID=""
          JIRA_LABELS="電話連絡,noc-oncall"
          JIRA_DEFAULT_PRIORITY=""

          CWA_LOCATION_NAME="臺北市"
          CWA_DATASET_ID="F-C0032-001"
          CWA_CITY_DATASET_ID="F-C0032-001"
          CWA_TOWNSHIP_DATASET_ID="F-D0047-089"
          CWA_OBSERVATION_DATASET_ID="O-A0001-001"
          CWA_MAX_LOCATION_DISTANCE_KM="80"
          CWA_MAX_OBSERVATION_DISTANCE_KM="80"
          CWA_CACHE_TTL_MS="180000"

          RESET_TOKEN_PARAM_NAME="/counter-app/prod/reset-token"
          JIRA_EMAIL_PARAM_NAME="/counter-app/prod/jira-email"
          JIRA_API_TOKEN_PARAM_NAME="/counter-app/prod/jira-api-token"
          CWA_API_KEY_PARAM_NAME="/counter-app/prod/cwa-api-key"

          read_required_parameter() {
            aws ssm get-parameter \
              --region "$AWS_REGION" \
              --name "$1" \
              --with-decryption \
              --query "Parameter.Value" \
              --output text
          }

          read_optional_parameter() {
            aws ssm get-parameter \
              --region "$AWS_REGION" \
              --name "$1" \
              --with-decryption \
              --query "Parameter.Value" \
              --output text 2>/dev/null || true
          }

          echo "[Deploy] Pulling ${IMAGE_URI}"

          RESET_TOKEN="$(read_required_parameter "$RESET_TOKEN_PARAM_NAME")"
          JIRA_EMAIL="$(read_optional_parameter "$JIRA_EMAIL_PARAM_NAME")"
          JIRA_API_TOKEN="$(read_optional_parameter "$JIRA_API_TOKEN_PARAM_NAME")"
          CWA_API_KEY="$(read_optional_parameter "$CWA_API_KEY_PARAM_NAME")"

          if [ -z "$JIRA_EMAIL" ] || [ "$JIRA_EMAIL" = "None" ]; then
            JIRA_EMAIL=""
          fi

          if [ -z "$JIRA_API_TOKEN" ] || [ "$JIRA_API_TOKEN" = "None" ]; then
            JIRA_API_TOKEN=""
          fi

          if [ -z "$CWA_API_KEY" ] || [ "$CWA_API_KEY" = "None" ]; then
            CWA_API_KEY=""
          fi

          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          docker pull "$IMAGE_URI"

          OLD_IMAGE="$(docker inspect --format='{{.Config.Image}}' "$CONTAINER_NAME" 2>/dev/null || true)"
          OLD_APP_VERSION="$(docker inspect --format='{{range .Config.Env}}{{println .}}{{end}}' "$CONTAINER_NAME" 2>/dev/null \
            | awk -F= '$1 == "APP_VERSION" {print $2; exit}' || true)"

          run_app_container() {
            container_name="$1"
            publish_arg="$2"
            restart_policy="$3"
            image="$4"
            app_version="$5"

            docker run -d \
              --name "$container_name" \
              --restart "$restart_policy" \
              --log-driver json-file \
              --log-opt max-size=10m \
              --log-opt max-file=3 \
              --health-cmd "wget -qO- http://127.0.0.1:${APP_PORT}/ready || exit 1" \
              --health-interval 30s \
              --health-timeout 5s \
              --health-retries 3 \
              --health-start-period 20s \
              -p "$publish_arg" \
              -e "PORT=${APP_PORT}" \
              -e "APP_VERSION=${app_version}" \
              -e "TRUST_PROXY_HOPS=${TRUST_PROXY_HOPS}" \
              -e "REDIS_HOST=${REDIS_ENDPOINT}" \
              -e "REDIS_PORT=${REDIS_PORT}" \
              -e "REDIS_URL=${REDIS_URL}" \
              -e "RESET_TOKEN=${RESET_TOKEN}" \
              -e "JIRA_BASE_URL=${JIRA_BASE_URL}" \
              -e "JIRA_REST_BASE_URL=${JIRA_REST_BASE_URL}" \
              -e "JIRA_EMAIL=${JIRA_EMAIL}" \
              -e "JIRA_API_TOKEN=${JIRA_API_TOKEN}" \
              -e "JIRA_PROJECT_KEY=${JIRA_PROJECT_KEY}" \
              -e "JIRA_ISSUE_TYPE=${JIRA_ISSUE_TYPE}" \
              -e "JIRA_ISSUE_TYPE_ID=${JIRA_ISSUE_TYPE_ID}" \
              -e "JIRA_LABELS=${JIRA_LABELS}" \
              -e "JIRA_DEFAULT_PRIORITY=${JIRA_DEFAULT_PRIORITY}" \
              -e "CWA_API_KEY=${CWA_API_KEY}" \
              -e "CWA_LOCATION_NAME=${CWA_LOCATION_NAME}" \
              -e "CWA_DATASET_ID=${CWA_DATASET_ID}" \
              -e "CWA_CITY_DATASET_ID=${CWA_CITY_DATASET_ID}" \
              -e "CWA_TOWNSHIP_DATASET_ID=${CWA_TOWNSHIP_DATASET_ID}" \
              -e "CWA_OBSERVATION_DATASET_ID=${CWA_OBSERVATION_DATASET_ID}" \
              -e "CWA_MAX_LOCATION_DISTANCE_KM=${CWA_MAX_LOCATION_DISTANCE_KM}" \
              -e "CWA_MAX_OBSERVATION_DISTANCE_KM=${CWA_MAX_OBSERVATION_DISTANCE_KM}" \
              -e "CWA_CACHE_TTL_MS=${CWA_CACHE_TTL_MS}" \
              "$image"
          }

          wait_for_app() {
            host_port="$1"
            label="$2"

            for attempt in $(seq 1 35); do
              if curl -fsS "http://127.0.0.1:${host_port}/ready" >/dev/null; then
                curl -fsS "http://127.0.0.1:${host_port}/health" >/dev/null
                curl -fsS "http://127.0.0.1:${host_port}/whoami"
                echo "[Deploy] ${label} is ready"
                return 0
              fi

              echo "[Deploy] waiting for ${label} (${attempt}/35)"
              sleep 1
            done

            return 1
          }

          cleanup_candidate() {
            docker rm -f "$CANDIDATE_CONTAINER_NAME" >/dev/null 2>&1 || true
          }

          rollback_old_container() {
            if [ -z "$OLD_IMAGE" ]; then
              echo "[Deploy] no old image to roll back to"
              return 1
            fi

            echo "[Deploy] rolling back to ${OLD_IMAGE}"
            docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true
            run_app_container \
              "$CONTAINER_NAME" \
              "${HOST_PORT}:${APP_PORT}" \
              "unless-stopped" \
              "$OLD_IMAGE" \
              "${OLD_APP_VERSION:-rollback}"
            wait_for_app "$HOST_PORT" "rollback container"
          }

          trap cleanup_candidate EXIT

          echo "[Deploy] starting candidate container on localhost:${CANDIDATE_HOST_PORT}"
          cleanup_candidate
          run_app_container \
            "$CANDIDATE_CONTAINER_NAME" \
            "127.0.0.1:${CANDIDATE_HOST_PORT}:${APP_PORT}" \
            "no" \
            "$IMAGE_URI" \
            "$APP_VERSION"

          if ! wait_for_app "$CANDIDATE_HOST_PORT" "candidate container"; then
            echo "[Deploy] candidate container failed health check"
            docker logs --tail 120 "$CANDIDATE_CONTAINER_NAME" || true
            exit 1
          fi

          echo "[Deploy] candidate passed; switching production container"
          cleanup_candidate
          docker rm -f "$CONTAINER_NAME" >/dev/null 2>&1 || true
          run_app_container \
            "$CONTAINER_NAME" \
            "${HOST_PORT}:${APP_PORT}" \
            "unless-stopped" \
            "$IMAGE_URI" \
            "$APP_VERSION"

          if ! wait_for_app "$HOST_PORT" "production container"; then
            echo "[Deploy] production container failed after switch"
            docker logs --tail 120 "$CONTAINER_NAME" || true
            rollback_old_container || true
            exit 1
          fi

          docker image prune -af --filter "until=24h" || true

          echo "[Deploy] Done"
          SCRIPT

          sed -i \
            -e "s|__AWS_REGION__|${AWS_REGION}|g" \
            -e "s|__AWS_ACCOUNT_ID__|${AWS_ACCOUNT_ID}|g" \
            -e "s|__ECR_REPOSITORY__|${ECR_REPOSITORY}|g" \
            -e "s|__IMAGE_TAG__|${IMAGE_TAG}|g" \
            deploy-on-instance.sh

          jq -n --arg script "$(cat deploy-on-instance.sh)" \
            '{commands: [$script], executionTimeout: ["900"]}' \
            > ssm-parameters.json

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids $INSTANCE_IDS \
            --document-name "AWS-RunShellScript" \
            --comment "$DEPLOY_COMMENT" \
            --parameters file://ssm-parameters.json \
            --query "Command.CommandId" \
            --output text)

          echo "SSM command id: $COMMAND_ID"
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

          for attempt in {1..90}; do
            PENDING=0

            for INSTANCE_ID in $INSTANCE_IDS; do
              STATUS=$(aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "Status" \
                --output text 2>/dev/null || echo "Pending")

              echo "Attempt $attempt: ${INSTANCE_ID} SSM status is ${STATUS}"

              case "$STATUS" in
                Success)
                  ;;
                Pending|InProgress|Delayed)
                  PENDING=1
                  ;;
                *)
                  echo "SSM deployment failed on ${INSTANCE_ID}"
                  aws ssm get-command-invocation \
                    --command-id "$COMMAND_ID" \
                    --instance-id "$INSTANCE_ID" \
                    --query "{stdout:StandardOutputContent,stderr:StandardErrorContent}" \
                    --output json || true
                  exit 1
                  ;;
              esac
            done

            if [ "$PENDING" -eq 0 ]; then
              exit 0
            fi

            sleep 10
          done

          echo "SSM deployment did not finish in time"
          exit 1

      - name: Start ASG instance refresh fallback
        id: refresh
        if: env.ALLOW_ASG_REFRESH_FALLBACK == 'true' && steps.ssm_deploy.outcome != 'success'
        run: |
          echo "SSM in-place deployment was not successful. Falling back to ASG instance refresh."
          set +e
          START_OUTPUT=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name $ASG_NAME \
            --preferences '{"MinHealthyPercentage":100,"InstanceWarmup":120}' \
            --query 'InstanceRefreshId' \
            --output text 2>&1)
          START_EXIT=$?
          set -e

          if [ "$START_EXIT" -eq 0 ]; then
            REFRESH_ID="$START_OUTPUT"
            echo "Started ASG instance refresh: $REFRESH_ID"
          elif echo "$START_OUTPUT" | grep -q "InstanceRefreshInProgress"; then
            echo "An ASG instance refresh is already running. Waiting for the existing refresh instead."

            REFRESH_ID=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --query "InstanceRefreshes[?Status=='Pending' || Status=='InProgress' || Status=='Cancelling' || Status=='RollbackInProgress'] | [0].InstanceRefreshId" \
              --output text)

            if [ -z "$REFRESH_ID" ] || [ "$REFRESH_ID" = "None" ]; then
              echo "Could not find the existing instance refresh id."
              echo "$START_OUTPUT"
              exit 1
            fi

            echo "Using existing ASG instance refresh: $REFRESH_ID"
          else
            echo "$START_OUTPUT"
            exit "$START_EXIT"
          fi

          echo "refresh_id=$REFRESH_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for ASG instance refresh
        if: env.ALLOW_ASG_REFRESH_FALLBACK == 'true' && steps.ssm_deploy.outcome != 'success'
        run: |
          REFRESH_ID="${{ steps.refresh.outputs.refresh_id }}"

          # 沒有這段等待，GitHub Actions 可能顯示成功，
          # 但 ASG 後面其實換機失敗。
          for attempt in {1..60}; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --instance-refresh-ids "$REFRESH_ID" \
              --query 'InstanceRefreshes[0].Status' \
              --output text)

            echo "Attempt $attempt: refresh status is $STATUS"

            case "$STATUS" in
              Successful)
                exit 0
                ;;
              Failed|Cancelled|RollbackFailed|RollbackSuccessful)
                exit 1
                ;;
            esac

            sleep 30
          done

          echo "Instance refresh did not finish in time"
          exit 1

      - name: Fail when in-place deployment is unavailable
        if: env.ALLOW_ASG_REFRESH_FALLBACK != 'true' && steps.ssm_deploy.outcome != 'success'
        run: |
          echo "::error::No in-place deployment was completed."
          echo "::error::If the SSM deploy step ran, expand 'Deploy to existing EC2 with SSM' for the real error."
          echo "::error::If the SSM deploy step was skipped, expand 'Find current ASG instances' to confirm instance_ids was written."
          echo "::error::ASG instance refresh fallback is disabled, so the old EC2/container was left untouched."
          echo "Fix SSM from AWS CloudShell, then re-run this workflow:"
          echo "  cd ~"
          echo "  git clone https://github.com/Grezn/counter-app.git || true"
          echo "  cd counter-app"
          echo "  git pull --ff-only"
          echo "  bash infra/setup-github-oidc.sh"
          echo "  bash infra/setup-ec2-ssm-parameters.sh"
          exit 1

      - name: Show deployed image tags
        if: always()
        run: |
          echo "Pushed: $IMAGE_URI:latest"
          echo "Pushed: $IMAGE_URI:$IMAGE_TAG"
          if [ "${{ steps.ssm_deploy.outcome }}" = "success" ]; then
            echo "Deployment mode: in-place SSM candidate + production switch"
          elif [ "${ALLOW_ASG_REFRESH_FALLBACK}" = "true" ]; then
            echo "Deployment mode: ASG instance refresh fallback"
          else
            echo "Deployment mode: failed before ASG fallback; old version remained online"
          fi
